# Compose chuẩn Dokploy — đặt file này tại server/docker-compose.dokploy.yaml trong repo mem0
# (hoặc thay thế server/docker-compose.yaml). Compose path trên Dokploy: server/docker-compose.dokploy.yaml
#
# Khác bản gốc Mem0 (mem0-dev):
# - KHÔNG publish ports ra host (tránh trùng Dokploy :3000, Traefik :80/:443)
# - Không --reload, không mount .:/app (production)
# - POSTGRES_PASSWORD từ .env (không hardcode postgres)
#
# Domain: cấu hình trong Dokploy UI → service mem0 :8000, mem0-dashboard :3000 (port container)

name: mem0-production

services:
  mem0:
    build:
      context: ..
      dockerfile: server/dev.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ""
      DASHBOARD_URL: ${DASHBOARD_URL}
      APP_DB_NAME: ${APP_DB_NAME:-mem0_app}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      MEM0_TELEMETRY: ${MEM0_TELEMETRY:-false}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "pip install -q --force-reinstall --no-deps mem0ai &&
             alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./history:/app/history
    networks:
      - mem0_network
    # Không có ports: — Dokploy/Traefik route theo domain

  postgres:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    shm_size: "128mb"
    networks:
      - mem0_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_db:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    # Không publish 8432:5432 — tách biệt postgres multica/airouter trên VPS

  mem0-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    networks:
      - mem0_network
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: http://mem0:8000
      NEXT_PUBLIC_INSTANCE_NAME: ${NEXT_PUBLIC_INSTANCE_NAME:-Mem0}
    depends_on:
      mem0:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Container listen :3000 — KHÔNG map host :3000 (Dokploy UI đã chiếm host :3000)

volumes:
  postgres_db:

networks:
  mem0_network:
    driver: bridge
